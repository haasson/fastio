name: E2E (smoke)

# На каждый push/PR в main: smoke (поднимаются ли storefront+admin) + критические
# регресс-флоу, которые дёшевы и стрелять не должны НИКОГДА — кухонный lifecycle
# и приём invite (RPC+edge уровень, ~5с на оба, без UI). Полный suite — ночью в
# e2e-nightly.yml. Не блокирует merge (нужен явный required-check в branch
# protection если потребуется), но даёт раннюю красную лампу прямо на PR.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: start Supabase
        # supabase start подтягивает миграции из supabase/migrations/* автоматически.
        # config.toml [db.seed] sql_paths указывает на отсутствующий ./seed.sql —
        # seed грузим явно следующим шагом.
        run: supabase start

      - name: wait for PostgREST
        # supabase start ждёт Postgres, но PostgREST (REST-слой) может подниматься
        # чуть позже. Storefront ходит в БД через supabase-js → PostgREST, а не psql.
        # Без ожидания первый запрос tenant middleware ловит network error → 503.
        run: until curl -s http://127.0.0.1:54321/rest/v1/ -o /dev/null; do sleep 2; done

      - name: export local Supabase env for apps
        # apps/*/.env gitignored → в CI их нет. Берём РЕАЛЬНЫЕ ключи поднятого
        # локального supabase и кладём в $GITHUB_ENV → их подхватят build (бейк в
        # клиентский бандл) и preview-runtime (storefront SSR создаёт supabase-клиент
        # на сервере). Version-proof: какие ключи сгенерил supabase start — те и берём.
        run: |
          ST=$(supabase status -o json)
          {
            echo "NUXT_PUBLIC_SUPABASE_URL=$(echo "$ST" | jq -r '.API_URL')"
            echo "NUXT_PUBLIC_SUPABASE_ANON_KEY=$(echo "$ST" | jq -r '.ANON_KEY')"
            echo "NUXT_SUPABASE_SERVICE_ROLE_KEY=$(echo "$ST" | jq -r '.SERVICE_ROLE_KEY')"
          } >> "$GITHUB_ENV"

      - name: apply E2E seed
        # e2e-ci.sql — config-faithful дамп тенантов demo (retail) + services-start
        # (services) + owner demo@fastio.app: тенанты/меню/услуги/мастера/расписания,
        # на которых проходят tests/e2e/*. Затем globalSetup (setup.mjs) досоздаёт
        # customer/session и ресетит пароль admin'а. Автогенерится scripts/e2e/gen-e2e-seed.sh.
        run: |
          docker cp supabase/seed/e2e-ci.sql supabase_db_fastio:/tmp/seed.sql
          docker exec supabase_db_fastio psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f /tmp/seed.sql

      - name: install postgresql-client
        run: sudo apt-get install -y postgresql-client

      - name: install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: build apps for preview
        # webServer в CI поднимает nuxt preview (не dev) — собираем заранее, отдельным
        # шагом, чтобы сборка не упиралась в webServer-таймаут. --filter тянет и deps (^build).
        run: pnpm exec turbo run build --filter=storefront --filter=admin

      - name: map tenant subdomains to localhost
        # Nuxt резолвит тенанта по Host (<slug>.localhost). На ubuntu-раннере *.localhost
        # НЕ резолвится автоматически (RFC 6761 не обязывает резолвер; на macOS работает
        # mDNSResponder, отсюда «локально зелено»). Без этого webServer health-check на
        # demo.localhost:4711 висит до таймаута. Прописываем явно.
        run: echo "127.0.0.1 demo.localhost services-start.localhost" | sudo tee -a /etc/hosts

      - name: run smoke + critical regression tests
        # Local-in-CI: webServer (playwright.config) поднимает nuxt preview, supabase-env
        # приходит из $GITHUB_ENV (шаг export выше). SUPABASE_STAGING_URL не задан →
        # globalSetup идёт локальным путём (setup.mjs). Staging dual-path остаётся спящим.
        # Здесь только ВРЕМЯ-НЕЗАВИСИМЫЕ P0 (RPC/edge, не HTTP-pickup):
        #   kitchen-flow   — RPC/DB lifecycle очереди (триггеры 304/306);
        #   invite-flow    — edge+RPC (get-invite/accept-invite, регресс на 3 P0 invite);
        #   order-lifecycle — RPC update_order_status (цепочка статусов + отмена).
        # Edge поднимает supabase start ([edge_runtime] enabled=true), ключи консистентны.
        # order-pricing / promo НЕ здесь: они идут через HTTP POST /api/orders (pickup),
        # а demo в сиде открыт 12:00–03:00 Krasnoyarsk → на push в произвольное время
        # суток словили бы 400 «Филиал закрыт» (та же time-fragility, что у order-flow).
        # Полный набор, включая их, гоняет e2e-nightly (фиксированное время).
        env:
          CI: 'true'
        run: pnpm exec playwright test smoke-storefront.spec.ts smoke-admin.spec.ts kitchen-flow.spec.ts invite-flow.spec.ts order-lifecycle.spec.ts

      - name: upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7
