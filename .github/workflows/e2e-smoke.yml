name: E2E (smoke)

# Smoke-уровень: только проверка что storefront и admin вообще поднимаются и
# отдают / без ошибок. Полный suite — в e2e-nightly.yml. Не блокирует merge
# (требуется явный required-check в branch protection если нужно).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: start Supabase
        # supabase start подтягивает миграции из supabase/migrations/* автоматически.
        # config.toml [db.seed] sql_paths указывает на отсутствующий ./seed.sql —
        # seed грузим явно следующим шагом.
        run: supabase start

      - name: apply E2E seed
        # e2e-ci.sql — config-faithful дамп тенантов demo (retail) + services-start
        # (services) + owner demo@fastio.app: тенанты/меню/услуги/мастера/расписания,
        # на которых проходят tests/e2e/*. Затем globalSetup (setup.mjs) досоздаёт
        # customer/session и ресетит пароль admin'а. Автогенерится scripts/e2e/gen-e2e-seed.sh.
        run: |
          docker cp supabase/seed/e2e-ci.sql supabase_db_fastio:/tmp/seed.sql
          docker exec supabase_db_fastio psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f /tmp/seed.sql

      - name: install postgresql-client
        run: sudo apt-get install -y postgresql-client

      - name: install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: run smoke tests
        # Local-in-CI: dev-сервера (webServer в playwright.config) берут локальный Supabase
        # из закоммиченных apps/*/.env (URL 127.0.0.1:54321 + local anon/service-role).
        # НЕ инжектим NUXT_PUBLIC_SUPABASE_* — у admin и storefront РАЗНЫЕ anon-ключи,
        # единый override сломал бы один из них; пустой staging-секрет — тем более.
        # SUPABASE_STAGING_URL не задан → globalSetup идёт локальным путём (setup.mjs).
        # Staging dual-path в global-setup.mjs остаётся спящим (см. e2e-ci infra docs).
        env:
          CI: 'true'
        run: pnpm exec playwright test smoke-storefront.spec.ts smoke-admin.spec.ts

      - name: upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 7
