name: Supabase Migrations

# Применяем миграции через ssh + docker exec, минуя публичный 5432 и Coolify-
# nginx-stream-проксей. Это убирает: (1) необходимость держать Postgres-порт
# открытым в интернет, (2) хрупкий nginx с залипшим IP апстрима при рестартах
# Postgres контейнера, (3) пароль в GH secret (внутри контейнера local-socket
# peer-auth для роли postgres работает без пароля).
#
# Скорость: 3 ssh-вызова total (discover, fetch applied, apply bundle) — не по
# одному на миграцию. Иначе SSH-handshake × N = минуты.
#
# Требуемые secrets (берём те же что у deploy-functions.yml):
#   - VPS_SSH_KEY  — приватный ed25519 (BEGIN/END блок целиком)
#   - VPS_HOST     — 109.71.242.205

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/migrate.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Apply pending migrations
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail

          SSH="ssh -o BatchMode=yes root@${VPS_HOST}"

          # 1/3 — Discover контейнера и bootstrap трекера + список applied.
          # supabase-db- префикс стабилен при rebuild'е Coolify.
          DB_CT=$($SSH "docker ps --format '{{.Names}}' | grep -E '^supabase-db-' | head -1")
          if [ -z "$DB_CT" ]; then
            echo "::error::supabase-db container not found on VPS"
            exit 1
          fi
          echo "DB container: $DB_CT"

          # 2/3 — Bootstrap + fetch applied versions единым psql-сеансом.
          APPLIED=$($SSH "docker exec -i $DB_CT psql -U postgres -d postgres -tA -v ON_ERROR_STOP=1" <<'SQL'
          CREATE SCHEMA IF NOT EXISTS supabase_migrations;
          CREATE TABLE IF NOT EXISTS supabase_migrations.schema_migrations (
            version text PRIMARY KEY,
            applied_at timestamptz NOT NULL DEFAULT now()
          );
          SELECT version FROM supabase_migrations.schema_migrations ORDER BY version;
          SQL
          )
          # APPLIED содержит и "CREATE SCHEMA"/"CREATE TABLE" сообщения, и числа.
          # Фильтруем только version-строки (вида цифр).
          APPLIED_LIST=$(echo "$APPLIED" | grep -E '^[0-9]+$' || true)
          existing=$(echo "$APPLIED_LIST" | grep -c '^' || true)
          [ -z "$APPLIED_LIST" ] && existing=0
          echo "Already tracked: $existing migrations"

          declare -A APPLIED_SET
          for v in $APPLIED_LIST; do APPLIED_SET[$v]=1; done

          # Bootstrap: если трекер пустой — помечаем все *.sql кроме последней как applied.
          # Последняя применится через общий цикл ниже как pending.
          BUNDLE=""
          if [ "$existing" = "0" ]; then
            echo "Empty schema_migrations — bootstrap markers for all existing migrations except the latest"
            latest=$(ls supabase/migrations/*.sql | sort -V | tail -1)
            for f in $(ls supabase/migrations/*.sql | sort -V); do
              if [ "$f" = "$latest" ]; then continue; fi
              version=$(basename "$f" .sql | cut -d'_' -f1)
              BUNDLE+="INSERT INTO supabase_migrations.schema_migrations (version) VALUES ('$version') ON CONFLICT DO NOTHING;"$'\n'
              APPLIED_SET[$version]=1
            done
          fi

          # Собираем pending в единый SQL-бандл: каждая миграция в отдельной
          # транзакции, чтобы failure посередине не сломал атомарность остальных.
          PENDING_COUNT=0
          for f in $(ls supabase/migrations/*.sql | sort -V); do
            version=$(basename "$f" .sql | cut -d'_' -f1)
            if [ -n "${APPLIED_SET[$version]:-}" ]; then
              continue
            fi
            PENDING_COUNT=$((PENDING_COUNT + 1))
            BUNDLE+=$'\n'"\\echo '→ Applying $version ($(basename $f))'"$'\n'
            BUNDLE+="BEGIN;"$'\n'
            BUNDLE+=$(cat "$f")$'\n'
            BUNDLE+="INSERT INTO supabase_migrations.schema_migrations (version) VALUES ('$version');"$'\n'
            BUNDLE+="COMMIT;"$'\n'
          done

          if [ "$PENDING_COUNT" = "0" ] && [ -z "$BUNDLE" ]; then
            echo "All migrations up to date."
            exit 0
          fi

          echo "Pending migrations: $PENDING_COUNT"

          # 3/3 — Применяем bundle одним psql-сеансом внутри контейнера.
          echo "$BUNDLE" | $SSH "docker exec -i $DB_CT psql -U postgres -d postgres -v ON_ERROR_STOP=1"

          echo "All migrations applied."
