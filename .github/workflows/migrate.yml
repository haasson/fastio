name: Supabase Migrations

# Применяем миграции через ssh + docker exec, минуя публичный 5432 и Coolify-
# nginx-stream-проксей. Это убирает: (1) необходимость держать Postgres-порт
# открытым в интернет, (2) хрупкий nginx с залипшим IP апстрима при рестартах
# Postgres контейнера, (3) пароль в GH secret (внутри контейнера local-socket
# peer-auth для роли postgres работает без пароля).
#
# Требуемые secrets (берём те же что у deploy-functions.yml):
#   - VPS_SSH_KEY  — приватный ed25519 (BEGIN/END блок целиком)
#   - VPS_HOST     — 109.71.242.205

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Apply pending migrations
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail

          # Контейнер ищем по префиксу: при ребилде Coolify его id меняется,
          # но префикс supabase-db- стабилен.
          DB_CT=$(ssh -o BatchMode=yes "root@${VPS_HOST}" "docker ps --format '{{.Names}}' | grep -E '^supabase-db-' | head -1")
          if [ -z "$DB_CT" ]; then
            echo "::error::supabase-db container not found on VPS"
            exit 1
          fi
          echo "DB container: $DB_CT"

          # Обёртка: пайпаем stdin в docker exec psql внутри контейнера.
          # Локальный unix-сокет, peer-auth (см. pg_hba.conf supabase образа).
          psql_stdin() {
            ssh -o BatchMode=yes "root@${VPS_HOST}" "docker exec -i ${DB_CT} psql -U postgres -d postgres -v ON_ERROR_STOP=1"
          }
          psql_cmd() {
            ssh -o BatchMode=yes "root@${VPS_HOST}" "docker exec ${DB_CT} psql -U postgres -d postgres -v ON_ERROR_STOP=1 -tAc \"$1\""
          }

          # Bootstrap: создаём таблицу учёта если её нет.
          psql_stdin <<'SQL'
          CREATE SCHEMA IF NOT EXISTS supabase_migrations;
          CREATE TABLE IF NOT EXISTS supabase_migrations.schema_migrations (
            version text PRIMARY KEY,
            applied_at timestamptz NOT NULL DEFAULT now()
          );
          SQL

          existing=$(psql_cmd "SELECT count(*) FROM supabase_migrations.schema_migrations")
          echo "Already tracked: $existing migrations"

          # Если таблица пустая — bootstrap: помечаем все *.sql кроме последней
          # как applied. Последняя применится в цикле ниже.
          if [ "$existing" = "0" ]; then
            echo "Empty schema_migrations — bootstrap markers for all existing migrations except the latest"
            latest=$(ls supabase/migrations/*.sql | sort -V | tail -1)
            for f in $(ls supabase/migrations/*.sql | sort -V); do
              if [ "$f" = "$latest" ]; then continue; fi
              version=$(basename "$f" .sql | cut -d'_' -f1)
              psql_cmd "INSERT INTO supabase_migrations.schema_migrations (version) VALUES ('$version') ON CONFLICT DO NOTHING" >/dev/null
            done
            echo "Bootstrap done. Latest ($latest) will be applied below."
          fi

          # Применяем pending. Каждый файл стримим через stdin внутрь контейнера.
          for f in $(ls supabase/migrations/*.sql | sort -V); do
            version=$(basename "$f" .sql | cut -d'_' -f1)
            applied=$(psql_cmd "SELECT 1 FROM supabase_migrations.schema_migrations WHERE version='$version'")
            if [ "$applied" = "1" ]; then
              continue
            fi
            echo "→ Applying $f"
            psql_stdin < "$f"
            psql_cmd "INSERT INTO supabase_migrations.schema_migrations (version) VALUES ('$version')" >/dev/null
            echo "✓ Applied $version"
          done

          echo "All migrations up to date."
