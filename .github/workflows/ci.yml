name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: lint
        run: pnpm lint

      - name: tests
        env:
          # PREPROD-225: включаем drift-check для TENANT_TABLES. Сам тест
          # сидит за двойным гардом (`enabled && SUPABASE_URL && KEY`) и
          # скипается, если supabase не поднят. Реальная проверка идёт
          # только на nightly-job с живой БД, тут флаг просто разрешает.
          RUN_TENANT_TABLES_DRIFT_CHECK: '1'
        run: pnpm test:run

      - name: features:validate (admin)
        run: pnpm features:validate

      - name: features:validate (storefront)
        run: pnpm storefront-features:validate

      - name: realtime channel cleanup audit (REL-01)
        # D-09: каждый файл с .channel() обязан содержать removeChannel.
        # Размещено в check (не security) — REL-01 это code-correctness gate,
        # должен блокировать PR, а не только main.
        run: |
          if ! bash scripts/audit/realtime-channel-audit.sh; then
            echo "::error::REL-01: Realtime channel leak detected. Every supabase.channel() must be paired with removeChannel()."
            exit 1
          fi

  deno-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: edge-functions lint (Deno)
        working-directory: supabase/functions
        run: deno lint

      - name: edge-functions typecheck (Deno)
        working-directory: supabase/functions
        run: |
          find . -type f \( -name 'index.ts' -o -name 'lib.ts' \) \
            -not -path './_shared/*' -print0 \
            | xargs -0 deno check

      - name: edge-functions tests (Deno)
        working-directory: supabase/functions
        run: deno task test

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: build storefront
        run: pnpm build --filter storefront

      - name: check service_role not in public bundle
        # SEC-02, D-04: сканируем только .output/public/ — серверный бандл
        # легитимно содержит "service_role" в docstring @supabase/auth-js.
        # Публичный бандл обязан быть чист.
        run: |
          if grep -r "service_role" apps/storefront/.output/public/ 2>/dev/null; then
            echo "::error::SECURITY: service_role found in storefront public bundle"
            exit 1
          fi
          echo "Security check passed: service_role not found in public bundle"

  # PERF-02: Lighthouse CI gate.
  # Pinned to @lhci/cli@0.14.0 — 0.15.x ships lighthouse@12.6.1 which requires Node>=22.19;
  # this pipeline uses Node 20. Mobile preset (5 runs) per ROADMAP success criterion #2.
  # No `if: main` gate — must run on PRs so regressions block merge before hitting main.
  lhci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # lhci мерит ЛОКАЛЬНО собранный storefront (а не прод demo.fastio.ru, который
      # к тому же отдавал 503) — это и есть PR-регресс-гейт. Поднимаем бэкенд как в
      # e2e: supabase + seed + env + host-резолв, lighthouserc сам стартует nuxt preview.
      - name: setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: start Supabase
        run: supabase start

      - name: wait for PostgREST
        # supabase start ждёт Postgres, но PostgREST (REST-слой) может подниматься
        # чуть позже. Storefront ходит в БД через supabase-js → PostgREST, а не psql.
        # Без ожидания первый запрос tenant middleware ловит network error → 503.
        run: until curl -s http://127.0.0.1:54321/rest/v1/ -o /dev/null; do sleep 2; done

      - name: export local Supabase env for storefront
        run: |
          ST=$(supabase status -o json)
          {
            echo "NUXT_PUBLIC_SUPABASE_URL=$(echo "$ST" | jq -r '.API_URL')"
            echo "NUXT_PUBLIC_SUPABASE_ANON_KEY=$(echo "$ST" | jq -r '.ANON_KEY')"
            echo "NUXT_SUPABASE_SERVICE_ROLE_KEY=$(echo "$ST" | jq -r '.SERVICE_ROLE_KEY')"
          } >> "$GITHUB_ENV"

      - name: apply E2E seed
        run: |
          docker cp supabase/seed/e2e-ci.sql supabase_db_fastio:/tmp/seed.sql
          docker exec supabase_db_fastio psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f /tmp/seed.sql

      - name: map tenant subdomain to localhost
        # *.localhost не резолвится автоматически на ubuntu-раннере (см. e2e).
        run: echo "127.0.0.1 demo.localhost" | sudo tee -a /etc/hosts

      - name: build storefront
        run: pnpm build --filter storefront

      - name: diagnose storefront 503
        # DIAGNOSTIC — убрать после фикса. Фиксирует auth + /api/tenant до LHCI.
        continue-on-error: true
        run: |
          echo "=== 1. PostgREST auth test (service role) ==="
          SK="$NUXT_SUPABASE_SERVICE_ROLE_KEY"
          printf "key prefix (first 10): %.10s...\n" "$SK"
          curl -si "http://127.0.0.1:54321/rest/v1/tenants?slug=eq.demo&select=slug" \
            -H "apikey: $SK" -H "Authorization: Bearer $SK"
          echo ""
          echo "=== 2. Storefront /api/tenant response ==="
          PORT=4712 \
            pnpm --filter storefront exec nuxt preview > /tmp/diag-srv.log 2>&1 &
          SRV_PID=$!
          for i in $(seq 1 20); do grep -q "Listening" /tmp/diag-srv.log 2>/dev/null && break; sleep 1; done
          echo "--- server startup log ---"
          cat /tmp/diag-srv.log
          echo "--- /api/tenant response ---"
          curl -sv "http://demo.localhost:4712/api/tenant" 2>&1 || true
          kill $SRV_PID 2>/dev/null || true
          wait $SRV_PID 2>/dev/null || true

      - name: run LHCI
        # lighthouserc.json: startServerCommand поднимает nuxt preview собранного
        # storefront на :4711, url = http://demo.localhost:4711/.
        run: npx @lhci/cli@0.14.0 autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
