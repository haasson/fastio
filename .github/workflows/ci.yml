name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: lint
        run: pnpm lint

      - name: tests
        run: pnpm test:run

      - name: features:validate (admin)
        run: pnpm features:validate

      - name: features:validate (storefront)
        run: pnpm storefront-features:validate

  deno-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: edge-functions lint (Deno)
        working-directory: supabase/functions
        run: deno lint

      - name: edge-functions typecheck (Deno)
        working-directory: supabase/functions
        run: |
          find . -type f \( -name 'index.ts' -o -name 'lib.ts' \) \
            -not -path './_shared/*' -print0 \
            | xargs -0 deno check

      - name: edge-functions tests (Deno)
        working-directory: supabase/functions
        run: deno task test
