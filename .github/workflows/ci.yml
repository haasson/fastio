name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: lint
        run: pnpm lint

      - name: tests
        env:
          # PREPROD-225: включаем drift-check для TENANT_TABLES. Сам тест
          # сидит за двойным гардом (`enabled && SUPABASE_URL && KEY`) и
          # скипается, если supabase не поднят. Реальная проверка идёт
          # только на nightly-job с живой БД, тут флаг просто разрешает.
          RUN_TENANT_TABLES_DRIFT_CHECK: '1'
        run: pnpm test:run

      - name: features:validate (admin)
        run: pnpm features:validate

      - name: features:validate (storefront)
        run: pnpm storefront-features:validate

      - name: realtime channel cleanup audit (REL-01)
        # D-09: каждый файл с .channel() обязан содержать removeChannel.
        # Размещено в check (не security) — REL-01 это code-correctness gate,
        # должен блокировать PR, а не только main.
        run: |
          if ! bash scripts/audit/realtime-channel-audit.sh; then
            echo "::error::REL-01: Realtime channel leak detected. Every supabase.channel() must be paired with removeChannel()."
            exit 1
          fi

  deno-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: edge-functions lint (Deno)
        working-directory: supabase/functions
        run: deno lint

      - name: edge-functions typecheck (Deno)
        working-directory: supabase/functions
        run: |
          find . -type f \( -name 'index.ts' -o -name 'lib.ts' \) \
            -not -path './_shared/*' -print0 \
            | xargs -0 deno check

      - name: edge-functions tests (Deno)
        working-directory: supabase/functions
        run: deno task test

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: build storefront
        run: pnpm build --filter storefront

      - name: check service_role not in public bundle
        # SEC-02, D-04: сканируем только .output/public/ — серверный бандл
        # легитимно содержит "service_role" в docstring @supabase/auth-js.
        # Публичный бандл обязан быть чист.
        run: |
          if grep -r "service_role" apps/storefront/.output/public/ 2>/dev/null; then
            echo "::error::SECURITY: service_role found in storefront public bundle"
            exit 1
          fi
          echo "Security check passed: service_role not found in public bundle"

  # PERF-02: Lighthouse CI gate.
  # Pinned to @lhci/cli@0.14.0 — 0.15.x ships lighthouse@12.6.1 which requires Node>=22.19;
  # this pipeline uses Node 20. Mobile preset (5 runs) per ROADMAP success criterion #2.
  # No `if: main` gate — must run on PRs so regressions block merge before hitting main.
  lhci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: build storefront
        run: pnpm build --filter storefront
        env:
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: run LHCI
        run: npx @lhci/cli@0.14.0 autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
